<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>プロセカ卡面收集器</title>
    <link rel="stylesheet" type="text/css" href="modern.css" />
    <script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/g/filesaver.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/jquery-contextmenu/2.7.1/jquery.contextMenu.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-contextmenu/2.7.1/jquery.contextMenu.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-contextmenu/2.7.1/jquery.ui.position.js"></script>
  </head>
  <body>
    <!-- Login Section -->
    <div class="login-container" id="loginSection">
      <div class="login-card">
        <div class="logo-section">
          <h1 class="app-title"></h1>
          <p class="app-subtitle">卡面圖鑑</p>
        </div>
        <div class="login-form">
          <label for="inputField" class="input-label">輸入您的帳號</label>
          <input
            type="text"
            id="inputField"
            name="inputField"
            class="modern-input"
            placeholder="英數字組合"
            pattern="[A-Za-z0-9]+"
            title="只能輸入大小寫英文和數字的組合"
          />
          <button class="btn-primary" type="submit" id="loginBtn">
            開始使用
          </button>
          <div class="divider">
            <span>或</span>
          </div>
          <button class="btn-guest" type="button" id="guestBtn">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
            >
              <path
                d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"
                stroke-width="2"
                stroke-linecap="round"
              />
              <circle cx="12" cy="7" r="4" stroke-width="2" />
            </svg>
            訪客模式
          </button>
        </div>
        <div class="features-info">
          <div class="feature-item">
            <span class="feature-icon">📱</span>
            <span class="feature-text">支援跨裝置同步</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">💾</span>
            <span class="feature-text">雲端自動存檔</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">📊</span>
            <span class="feature-text">詳細收集統計</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Main App Section -->
    <div class="app-container" id="appSection" style="display: none">
      <!-- Header -->
      <header class="modern-header">
        <div class="header-content">
          <div class="header-left">
            <h2 class="header-title">卡面圖鑑</h2>
            <span class="user-badge" id="userNameDisplay"></span>
            <span class="guest-badge" id="guestBadge" style="display: none">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
              >
                <path
                  d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"
                  stroke-width="2"
                />
                <circle cx="12" cy="7" r="4" stroke-width="2" />
              </svg>
              訪客模式
            </span>
          </div>
          <div class="header-actions">
            <a
              href="https://cieloneve.github.io/user"
              target="_blank"
              class="btn-icon"
              title="舊版"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
              >
                <path
                  d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"
                  stroke-width="2"
                  stroke-linecap="round"
                />
                <polyline
                  points="15 3 21 3 21 9"
                  stroke-width="2"
                  stroke-linecap="round"
                />
                <line
                  x1="10"
                  y1="14"
                  x2="21"
                  y2="3"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
              <span>舊版</span>
            </a>
            <button class="btn-icon" id="saveBtn" title="存檔">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
              >
                <path
                  d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"
                  stroke-width="2"
                />
                <polyline points="17 21 17 13 7 13 7 21" stroke-width="2" />
                <polyline points="7 3 7 8 15 8" stroke-width="2" />
              </svg>
              <span>存檔</span>
            </button>
            <button class="btn-icon" id="downloadBtn" title="下載">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
              >
                <path
                  d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"
                  stroke-width="2"
                />
              </svg>
              <span>下載</span>
            </button>
            <button class="btn-icon" id="totalBtn" title="統計">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
              >
                <line x1="12" y1="20" x2="12" y2="10" stroke-width="2" />
                <line x1="18" y1="20" x2="18" y2="4" stroke-width="2" />
                <line x1="6" y1="20" x2="6" y2="16" stroke-width="2" />
              </svg>
              <span>統計</span>
            </button>
          </div>
        </div>

        <!-- Character Navigation -->
        <nav class="character-nav">
          <div class="character-scroll">
            <button class="char-btn" data-index="001">一歌</button>
            <button class="char-btn" data-index="002">咲希</button>
            <button class="char-btn" data-index="003">穗波</button>
            <button class="char-btn" data-index="004">志步</button>
            <button class="char-btn" data-index="005">實乃理</button>
            <button class="char-btn" data-index="006">遙</button>
            <button class="char-btn" data-index="007">愛莉</button>
            <button class="char-btn" data-index="008">雫</button>
            <button class="char-btn" data-index="009">心羽</button>
            <button class="char-btn" data-index="010">杏</button>
            <button class="char-btn" data-index="011">彰人</button>
            <button class="char-btn" data-index="012">冬彌</button>
            <button class="char-btn" data-index="013">司</button>
            <button class="char-btn" data-index="014">笑夢</button>
            <button class="char-btn" data-index="015">寧寧</button>
            <button class="char-btn" data-index="016">類</button>
            <button class="char-btn" data-index="017">奏</button>
            <button class="char-btn" data-index="018">真冬</button>
            <button class="char-btn" data-index="019">繪名</button>
            <button class="char-btn" data-index="020">瑞希</button>
            <button class="char-btn" data-index="021">咪哭</button>
            <button class="char-btn" data-index="022">鈴醬</button>
            <button class="char-btn" data-index="023">連寶</button>
            <button class="char-btn" data-index="024">ㄦ力</button>
            <button class="char-btn" data-index="025">大姐</button>
            <button class="char-btn" data-index="026">大哥</button>
          </div>
        </nav>
      </header>

      <!-- Main Content -->
      <main class="modern-main">
        <!-- Stats Panel -->
        <div class="stats-panel" id="statsPanel"></div>

        <!-- Gallery -->
        <div class="modern-gallery" id="gallery">
          <div class="welcome-message">
            <div class="welcome-icon">🎴</div>
            <h3>歡迎使用卡面收集器</h3>
            <p>點擊上方角色名稱開始收集</p>
            <div class="tips">
              <p><strong>使用說明：</strong></p>
              <ul>
                <li>左鍵點擊圖片標記為已收集</li>
                <li>右鍵點擊可移除收藏或設定背景</li>
                <li>使用統計按鈕查看收集進度</li>
                <li>記得定期點擊存檔按鈕保存進度</li>
              </ul>
            </div>
          </div>
        </div>

        <!-- Hint Section -->
        <div class="hint-section" id="hintSection"></div>
      </main>

      <!-- Modal -->
      <div class="modern-modal" id="modal">
        <span class="modal-close">&times;</span>
        <img class="modal-content" src="" alt="" />
      </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <p>載入中...</p>
    </div>

    <script src="modern.js"></script>
  </body>
  <script>
    // Auto-fill username from localStorage
    name = localStorage.getItem("NeveUserName");
    if (name && name != "null") {
      $("input[type=text][name=inputField]").val(name);
    }
  </script>
</html>
